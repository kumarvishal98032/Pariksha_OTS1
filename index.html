<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pariksha OTS</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">

    <div class="logo-section">

        <img src="logo.png" class="logo">

        <div>

            <h1>PARIKSHA</h1>

            <p>Online Examination Platform</p>

        </div>

    </div>

    <div class="timer-section">

        <div class="timer-title">
            Time Left
        </div>

        <div id="timer">
            40:00
        </div>

    </div>

</div>

<div class="info-bar">

    <span>
        👤 Student :
        <b id="studentDisplay">--</b>
    </span>

    <span>
        📘 Test :
        Unit 1 & Unit 2
    </span>

    <span>
        📅 Date :
        <span id="examDate"></span>
    </span>

</div>

    
    <div id="studentWatermark"></div>
  
<div style="
background:#fdecea;
color:#b71c1c;
padding:12px;
text-align:center;
font-weight:bold;
font-size:16px;
border-bottom:2px solid #f44336;">
⚠️ IMPORTANT: Do not refresh the page, press Back, or close the browser during the test. Your responses may be lost.
</div>
    
    <div class="container">

        <!-- LEFT PANEL -->
        <div class="left">
            
            <label><b>Student Name:</b></label><br>
            <input type="text"
                   id="studentName"
                   placeholder="Enter your name">
            <br><br>

            <h3 id="qno"></h3>

            <p id="question"></p>

            <div id="options"></div>

            <br>

            <button onclick="prevQ()">Previous</button>

            <button onclick="clearResponse()">Clear Response</button>
            
            <button onclick="nextQ()">Save & Next</button>

            <button onclick="submitTest()">
                Submit Test
            </button>

        </div>

        <!-- RIGHT PANEL -->
        <div class="right">

            <h3>Question Palette</h3>

            <div id="palette"></div>

            <hr>

            <p>
                🟩 Answered
            </p>

            <p>
                ⬜ Not Answered
            </p>

        </div>

    </div>

   
    <script src="script.js"></script>

</body>

</html>
